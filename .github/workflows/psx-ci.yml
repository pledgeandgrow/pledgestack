name: PSX CI/CD Pipeline

on:
  push:
    branches: [main, develop]
    paths:
      - 'packages/core/native/**'
      - 'packages/core/src/psx/**'
      - '.github/workflows/psx-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'packages/core/native/**'
      - 'packages/core/src/psx/**'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  cargo-audit:
    name: Cargo Audit (Security)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --force

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-audit-${{ runner.os }}-${{ hashFiles('packages/core/native/Cargo.toml', '**/Cargo.lock') }}
          restore-keys: |
            cargo-audit-${{ runner.os }}-

      - name: Run cargo audit
        run: |
          cd packages/core/native
          cargo audit --deny warnings
        continue-on-error: true

      - name: Upload audit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cargo-audit-report
          path: packages/core/native/audit-report.json
          if-no-files-found: warn

  cargo-clippy:
    name: Cargo Clippy (Lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain with clippy
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            packages/core/native/target
          key: clippy-${{ runner.os }}-${{ hashFiles('packages/core/native/Cargo.toml', '**/Cargo.lock') }}
          restore-keys: |
            clippy-${{ runner.os }}-

      - name: Install napi-rs build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config

      - name: Run cargo clippy
        run: |
          cd packages/core/native
          cargo clippy --all-targets --all-features -- -D warnings
        continue-on-error: true

      - name: Run cargo clippy (no features)
        run: |
          cd packages/core/native
          cargo clippy --all-targets --no-default-features -- -D warnings
        continue-on-error: true

  cargo-test:
    name: Cargo Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            packages/core/native/target
          key: cargo-test-${{ runner.os }}-${{ hashFiles('packages/core/native/Cargo.toml', '**/Cargo.lock') }}
          restore-keys: |
            cargo-test-${{ runner.os }}-

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm -r build

      - name: Run cargo test
        run: |
          cd packages/core/native
          cargo test --all-features --verbose
        continue-on-error: true

  cargo-fmt:
    name: Cargo Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain with rustfmt
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: |
          cd packages/core/native
          cargo fmt -- --check
        continue-on-error: true

  cross-compile:
    name: Cross-Compile ${{ matrix.target }}
    needs: [cargo-audit, cargo-clippy]
    runs-on: ${{ startsWith(matrix.target, 'x86_64-pc-windows') && 'windows-latest' || startsWith(matrix.target, 'aarch64-pc-windows') && 'windows-latest' || startsWith(matrix.target, 'x86_64-apple') && 'macos-13' || startsWith(matrix.target, 'aarch64-apple') && 'macos-latest' || 'ubuntu-latest' }}
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-pc-windows-msvc
          - aarch64-pc-windows-msvc
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
          - x86_64-apple-darwin
          - aarch64-apple-darwin

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cross-compile-${{ matrix.target }}-${{ hashFiles('packages/core/native/Cargo.toml', '**/Cargo.lock') }}
          restore-keys: |
            cross-compile-${{ matrix.target }}-

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm -r build

      - name: Cross-compile for ${{ matrix.target }}
        run: |
          node -e "
            const { buildForTarget, SUPPORTED_TARGETS } = require('./packages/core/dist/psx/cross-compile.js');
            const target = SUPPORTED_TARGETS.find(t => t.target === '${{ matrix.target }}');
            if (!target) { console.error('Unknown target: ${{ matrix.target }}'); process.exit(1); }
            buildForTarget(target, process.cwd(), 'packages/core/native', '.pledge/dist')
              .then(result => {
                if (!result.success) { console.error(result.error); process.exit(1); }
                console.log('Built:', result.addonFiles);
              })
              .catch(err => { console.error(err); process.exit(1); });
          "
        continue-on-error: true

      - name: Upload addon artifact
        uses: actions/upload-artifact@v4
        with:
          name: addon-${{ matrix.target }}
          path: .pledge/dist/addons/${{ matrix.target }}/
          if-no-files-found: warn
          retention-days: 14

  bundle-analysis:
    name: Bundle Size Analysis
    needs: cross-compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm -r build

      - name: Download all addon artifacts
        uses: actions/download-artifact@v4
        with:
          path: .pledge/dist/addons
          pattern: addon-*
          merge-multiple: false

      - name: Run bundle analysis
        run: |
          node -e "
            const { analyzeBundle, formatBundleReport, saveBundleReport, loadBundleReport } = require('./packages/core/dist/psx/bundle-analysis.js');
            const prev = loadBundleReport('.pledge/bundle-report.json');
            const result = analyzeBundle(process.cwd(), '.pledge/dist/addons', prev);
            console.log(formatBundleReport(result));
            saveBundleReport(result, '.pledge/bundle-report.json');
          "

      - name: Upload bundle report
        uses: actions/upload-artifact@v4
        with:
          name: bundle-report
          path: .pledge/bundle-report.json
          retention-days: 90

  vitest:
    name: Vitest (JS/TS Tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm -r build

      - name: Run Vitest tests
        run: pnpm -r test
        continue-on-error: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vitest-results
          path: |
            **/coverage/
            **/test-results/
          if-no-files-found: warn
