name: Cross-Compile PSX Addons

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      targets:
        description: 'Comma-separated target triples (empty = all)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  detect-targets:
    name: Detect Targets
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          if [ -n "${{ inputs.targets }}" ]; then
            IFS=',' read -ra arr <<< "${{ inputs.targets }}"
            json="["
            for i in "${arr[@]}"; do json="$json \"$i\","; done
            json="${json%,}]"
          else
            json='["x86_64-pc-windows-msvc","aarch64-pc-windows-msvc","x86_64-unknown-linux-gnu","aarch64-unknown-linux-gnu","x86_64-apple-darwin","aarch64-apple-darwin"]'
          fi
          echo "matrix=$json" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.target }}
    needs: detect-targets
    runs-on: ${{ startsWith(matrix.target, 'x86_64-pc-windows') && 'windows-latest' || startsWith(matrix.target, 'aarch64-pc-windows') && 'windows-latest' || startsWith(matrix.target, 'x86_64-apple') && 'macos-13' || startsWith(matrix.target, 'aarch64-apple') && 'macos-latest' || 'ubuntu-latest' }}
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJson(needs.detect-targets.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install napi-rs CLI
        run: cargo install napi-cli --force || true

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm -r build

      - name: Cross-compile PSX addons for ${{ matrix.target }}
        run: |
          node -e "
            const { buildForTarget, SUPPORTED_TARGETS } = require('./packages/core/dist/psx/cross-compile.js');
            const target = SUPPORTED_TARGETS.find(t => t.target === '${{ matrix.target }}');
            if (!target) { console.error('Unknown target: ${{ matrix.target }}'); process.exit(1); }
            buildForTarget(target, process.cwd(), process.cwd(), '.pledge/dist')
              .then(result => {
                if (!result.success) { console.error(result.error); process.exit(1); }
                console.log('Built:', result.addonFiles);
              })
              .catch(err => { console.error(err); process.exit(1); });
          "
        continue-on-error: true

      - name: Upload addon artifact
        uses: actions/upload-artifact@v4
        with:
          name: addon-${{ matrix.target }}
          path: .pledge/dist/addons/${{ matrix.target }}/
          if-no-files-found: warn
          retention-days: 30

  manifest:
    name: Generate Manifest
    needs: build
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Download all addon artifacts
        uses: actions/download-artifact@v4
        with:
          path: .pledge/dist/addons
          pattern: addon-*
          merge-multiple: false

      - name: Reorganize and generate manifest
        run: |
          node -e "
            const fs = require('fs');
            const path = require('path');
            const distDir = '.pledge/dist';
            const addonsDir = path.join(distDir, 'addons');
            const manifest = {};

            if (fs.existsSync(addonsDir)) {
              for (const entry of fs.readdirSync(addonsDir)) {
                const entryPath = path.join(addonsDir, entry);
                if (fs.statSync(entryPath).isDirectory()) {
                  const target = entry.replace(/^addon-/, '');
                  const files = fs.readdirSync(entryPath).filter(f => f.endsWith('.node'));
                  if (files.length > 0) {
                    const targetDir = path.join(addonsDir, target);
                    fs.mkdirSync(targetDir, { recursive: true });
                    for (const f of files) {
                      fs.copyFileSync(path.join(entryPath, f), path.join(targetDir, f));
                    }
                    manifest[target] = files.map(f => 'addons/' + target + '/' + f);
                  }
                }
              }
            }

            fs.writeFileSync(path.join(distDir, 'manifest.json'), JSON.stringify(manifest, null, 2));
            console.log('Manifest:', JSON.stringify(manifest, null, 2));
          "

      - name: Upload manifest
        uses: actions/upload-artifact@v4
        with:
          name: addon-manifest
          path: |
            .pledge/dist/manifest.json
            .pledge/dist/addons/
          retention-days: 30

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            .pledge/dist/manifest.json
            .pledge/dist/addons/**/*.node
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
